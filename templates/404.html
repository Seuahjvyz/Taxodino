<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada - Taxodino</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .error-container {
            text-align: center;
            padding: 50px;
            min-height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .dino-error {
            font-size: 100px;
            animation: shake 0.5s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .btn-volver {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff6b35;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn-volver:hover {
            background: #ff5520;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="dino-error">🦕❓</div>
        <h1>404 - ¡Dinosaurio no encontrado!</h1>
        <p>Parece que esta página se extinguió como los dinosaurios...</p>
        <a href="/" class="btn-volver">← Volver al inicio</a>
    </div>
</body>
</html>
