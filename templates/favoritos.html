<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Explorers - Mis Favoritos</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="/static/css/stylee.css">

</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <img src="/static/img/dinosaurio.png" alt="Dinosaurio">
                <h1>Dino</h1>
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> <span>Inicio</span>
                </a>
                <a href="/favoritos" class="nav-link" id="favoritosLink">
                    <i class="fas fa-heart"></i> <span>Favoritos</span>
                </a>

                <div class="user-menu" id="userMenu">
                    <div class="user-menu-trigger" id="userMenuTrigger">
                        <i class="fas fa-user-circle"></i>
                        <span id="userNameDisplay">Usuario</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="user-dropdown" id="userDropdown"></div>
                </div>
            </div>
        </div>
    </nav>

    <div id="dino-bg-container"></div>

    <!-- Contenido principal -->
    <main class="main-content">
        <div class="hero-section">
            <h2><i class="fas fa-heart"></i> Mis Dinosaurios Favoritos <i class="fas fa-dragon"></i></h2>
            <p>Tus dinosaurios más queridos están aquí</p>
        </div>

        <!-- Grid de dinosaurios favoritos -->
        <div id="dinosaursGrid" class="dinosaurs-grid">
            <div class="loading-spinner">
                <i class="fas fa-dragon"></i>
                <p>Cargando tus favoritos...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 Dino Explorers - Todos los derechos reservados</p>
            <div class="footer-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-tiktok"></i>
            </div>
        </div>
    </footer>

    <script src="/static/js/menu-usuario.js"></script>
    <script src="/static/js/favoritos.js"></script>
</body>

</html>
