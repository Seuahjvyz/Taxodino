<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Explorers - Mi Perfil</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Estilos -->
    <link rel="stylesheet" href="/static/css/stylee.css">
    <style>
        .profile-container {
            background: white;
            border-radius: 32px;
            padding: 2rem;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #E8D5A3;
        }
        
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: #F4E9D8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            border: 3px solid #E67E22;
        }
        
        .profile-avatar i {
            font-size: 4rem;
            color: #E67E22;
        }
        
        .profile-info {
            margin-top: 1rem;
        }
        
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #E8D5A3;
        }
        
        .info-label {
            width: 120px;
            font-weight: 600;
            color: #2D4A22;
        }
        
        .info-value {
            flex: 1;
            color: #5D4037;
        }
        
        .edit-btn {
            background: linear-gradient(135deg, #E67E22, #F39C12);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1.5rem;
            width: 100%;
            font-size: 1rem;
        }
        
        .edit-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="/" class="navbar-brand">
                <img src="/static/img/dinosaurio.png" alt="Dinosaurio">
                <h1>Dino</h1>
            </a>

            <div class="nav-links">
                <a href="/" class="nav-link">
                    <i class="fas fa-home"></i> <span>Inicio</span>
                </a>
                <a href="/favoritos" class="nav-link">
                    <i class="fas fa-heart"></i> <span>Favoritos</span>
                </a>

                <div class="user-menu" id="userMenu">
                    <div class="user-menu-trigger" id="userMenuTrigger">
                        <i class="fas fa-user-circle"></i>
                        <span id="userNameDisplay">Usuario</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div class="user-dropdown" id="userDropdown"></div>
                </div>
            </div>
        </div>
    </nav>

    <div id="dino-bg-container"></div>

    <!-- Contenido principal -->
    <main class="main-content">
        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user-circle"></i>
                </div>
                <h2 id="profileName">Cargando...</h2>
                <p id="profileEmail"></p>
            </div>
            
            <div class="profile-info">
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-user"></i> Usuario:</div>
                    <div class="info-value" id="infoUsername">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-envelope"></i> Email:</div>
                    <div class="info-value" id="infoEmail">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-calendar"></i> Miembro desde:</div>
                    <div class="info-value" id="infoJoined">-</div>
                </div>
                <div class="info-row">
                    <div class="info-label"><i class="fas fa-heart"></i> Favoritos:</div>
                    <div class="info-value" id="infoFavorites">0 dinosaurios</div>
                </div>
            </div>
            
            <button class="edit-btn" onclick="alert('Funcionalidad en desarrollo')">
                <i class="fas fa-edit"></i> Editar Perfil
            </button>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <p>© 2026 Dino Explorers - Todos los derechos reservados</p>
            <div class="footer-icons">
                <i class="fab fa-facebook"></i>
                <i class="fab fa-twitter"></i>
                <i class="fab fa-instagram"></i>
                <i class="fab fa-tiktok"></i>
            </div>
        </div>
    </footer>

    <script src="/static/js/menu-usuario.js"></script>
    <script>
        // Cargar datos del perfil desde localStorage
        document.addEventListener('DOMContentLoaded', function() {
            const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
            
            if (user.username) {
                document.getElementById('profileName').textContent = user.username || 'Usuario';
                document.getElementById('profileEmail').textContent = user.email || '';
                document.getElementById('infoUsername').textContent = user.username || '-';
                document.getElementById('infoEmail').textContent = user.email || '-';
                document.getElementById('infoJoined').textContent = user.joined || '2026';
                
                // Cargar cantidad de favoritos
                const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
                document.getElementById('infoFavorites').textContent = favorites.length + ' dinosaurios';
            } else {
                document.getElementById('profileName').textContent = 'Invitado';
                document.getElementById('profileEmail').textContent = 'Inicia sesión para ver tu perfil';
            }
        });
    </script>
</body>

</html>
